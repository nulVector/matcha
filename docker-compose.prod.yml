x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "3"

services:
  postgres:
    image: postgres:15-alpine
    container_name: matcha-postgres
    restart: always
    env_file: .env
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    logging: *default-logging
    networks:
      - matcha_net

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: matcha-redis
    restart: always
    environment:
      - "REDIS_ARGS=--requirepass ${REDIS_PASSWORD} --maxmemory 4gb --maxmemory-policy noeviction"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4.5G
    logging: *default-logging
    networks:
      - matcha_net

  migrate:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: matcha-migrate
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "cd packages/db && npx prisma migrate deploy && node dist/prisma/seed.js"]
    networks:
      - matcha_net
    restart: "no"
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: matcha-api
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1.5G
    logging: *default-logging
    networks:
      - matcha_net

  socket:
    build:
      context: .
      dockerfile: apps/socket/Dockerfile
    container_name: matcha-socket
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 2G
    logging: *default-logging
    networks:
      - matcha_net

  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: matcha-workers
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 2G
    logging: *default-logging
    networks:
      - matcha_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.trymatcha.in/api/v1
        - NEXT_PUBLIC_WS_URL=https://socket.trymatcha.in
    container_name: matcha-web
    restart: always
    env_file: .env
    depends_on:
      - api
      - socket
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging
    networks:
      - matcha_net

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    env_file: .env
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--enable-feature=envvar-expansion'
      - '--storage.tsdb.retention.time=15d'
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging
    networks:
      - matcha_net

  grafana:
    image: grafana/grafana:13.1.0
    container_name: grafana
    restart: always
    env_file: .env
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SERVER_ROOT_URL=https://grafana.trymatcha.in
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging
    networks:
      - matcha_net

  redis-exporter:
    image: oliver006/redis_exporter:v1.86.0
    container_name: redis-exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 100M
    logging: *default-logging
    networks:
      - matcha_net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.20.1
    container_name: postgres-exporter
    restart: always
    env_file: .env
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 100M
    logging: *default-logging
    networks:
      - matcha_net

  node-exporter:
    image: prom/node-exporter:v1.12.0
    container_name: node-exporter
    restart: always
    pid: host
    volumes:
      - /:/rootfs:ro
    command:
      - '--path.rootfs=/rootfs'
    deploy:
      resources:
        limits:
          memory: 100M
    logging: *default-logging
    networks:
      - matcha_net

  cloudflared:
    image: cloudflare/cloudflared:2026.7.1
    container_name: cloudflare-tunnel
    restart: always
    command: tunnel --no-autoupdate run
    env_file: .env
    depends_on:
      - web
      - api
      - socket
      - grafana
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging
    networks:
      - matcha_net

networks:
  matcha_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  postgres_prod_data:
  redis_prod_data: