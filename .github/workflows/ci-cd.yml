name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx turbo run build --filter=@matcha/prisma

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check-types

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      JWT_SECRET: "dummy_test_secret"
      GOOGLE_CLIENT_ID: "dummy_client_id"
      GOOGLE_CLIENT_SECRET: "dummy_client_secret"
      RESEND_API_KEY: "re_123456789"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx turbo run build --filter=@matcha/prisma
        
      - name: Build internal packages
        run: npx turbo run build --filter="./packages/*"

      - name: Run tests
        run: npx vitest run

  docker-dry-run:
    name: Build ${{ matrix.app }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, socket, workers, web]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.app }} (No push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
            NEXT_PUBLIC_WS_URL=http://127.0.0.1:8080

  deploy:
    name: Deploy to Production
    needs: [lint-and-typecheck, test, docker-dry-run] 
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy repository to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/matcha"
          rm: true
          strip_components: 0

      - name: Execute Docker Compose on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PROD_ENV_FILE
          script: |
            set -e
            cd /home/ubuntu/matcha
            echo "$PROD_ENV_FILE" > .env
            docker builder prune -af
            docker image prune -af
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d postgres redis
            sleep 10 
            docker compose -f docker-compose.prod.yml up --exit-code-from migrate migrate
            docker compose -f docker-compose.prod.yml up -d
            docker system prune -f