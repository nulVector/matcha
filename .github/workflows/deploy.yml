name: Deploy to Oracle VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy repository to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/matcha"
          rm: true
          strip_components: 0

      - name: Execute Docker Compose on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/matcha
            echo "${{ secrets.PROD_ENV_FILE }}" > .env
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d postgres redis
            sleep 10
            docker compose -f docker-compose.prod.yml run --rm workers ./node_modules/.bin/prisma db push --schema=packages/db/prisma/schema.prisma
            docker compose -f docker-compose.prod.yml run --rm workers node packages/db/dist/prisma/seed.js
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af --filter "until=24h"